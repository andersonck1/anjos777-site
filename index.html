<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anjos777 - Elite</title>
    <style>
        /* Estilo Global de Elite */
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #0d1117; color: #fff; padding: 15px; }
        .card-container { background: #161b22; padding: 20px; border-radius: 16px; border: 1px solid #30363d; margin-bottom: 20px; }
        h3 { color: #fcd535; font-size: 14px; text-transform: uppercase; margin-bottom: 15px; }
        
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-valor { 
            background: #21262d; border: 1px solid #30363d; color: #fff;
            padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-valor:hover { border-color: #fcd535; }
        .btn-confirm { 
            background: linear-gradient(135deg, #fcd535, #d4ac0d); color: #000;
            padding: 20px; border-radius: 12px; width: 100%; border: none; font-weight: bold; font-size: 16px; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <h3>Escolha o valor do depósito</h3>
        <div class="grid-4">
            <button class="btn-valor">R$ 10</button>
            <button class="btn-valor">R$ 20</button>
            <button class="btn-valor">R$ 50</button>
            <button class="btn-valor">R$ 100</button>
        </div>
        <button class="btn-confirm">Confirmar Depósito PIX</button>
    </div>

</body>
</html>
