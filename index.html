<style>
    /* Estilo para a grade de valores */
    .amount-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
    .amount-btn { 
        background: #252d3d; border: 1px solid #334056; color: #fff; 
        padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer;
    }
    .amount-btn:active { background: #fcd535; color: #000; }
</style>

<div class="finance-panel">
    <h3>Escolha o valor do depósito</h3>
    <div class="amount-grid">
        <button class="amount-btn">R$ 10</button>
        <button class="amount-btn">R$ 20</button>
        <button class="amount-btn">R$ 50</button>
        <button class="amount-btn">R$ 100</button>
    </div>
</div>
