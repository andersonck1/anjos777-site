<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anjos777 Holding Lda</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #0b1e33; color: white; }
        .header { background: #1a3a5a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0b1e33; }
        .banner { background: #fcd535; color: #000; padding: 15px; text-align: center; font-weight: bold; margin: 10px; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #162d45; padding: 25px 10px; border-radius: 8px; text-align: center; border: 1px solid #2d5a88; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #1a3a5a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid #0b1e33; }
    </style>
</head>
<body>
    <div class="header">
        <span>Anjos777.com</span>
        <button onclick="alert('Abrindo Depósito...')">Depositar</button>
    </div>

    <div class="banner">BÔNUS INICIAL: GANHE 17777 R$</div>

    <div class="grid">
        <div class="card">JDB Slots</div>
        <div class="card">WG Esportes</div>
        <div class="card">TADA Pesca</div>
        <div class="card">Ezugi Vivo</div>
    </div>

    <div class="nav-bottom">
        <span>Vivo</span>
        <span>Esporte</span>
        <span>Favoritos</span>
    </div>
</body>
</html>
