<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anjos777</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #0b1e33; color: white; }
        .header { background: #1a3a5a; padding: 15px; display: flex; justify-content: space-between; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .game-card { background: #162d45; padding: 20px; border-radius: 8px; text-align: center; }
        
        /* Modal de Depósito (Oculto inicialmente) */
        #deposit-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: #1a3a5a; padding: 20px; border-radius: 10px; width: 80%; }
    </style>
</head>
<body>
    <div class="header">
        <span>Anjos777.com</span>
        <button onclick="document.getElementById('deposit-modal').style.display='flex'">Depositar</button>
    </div>

    <div class="grid">
        <div class="game-card">JDB Slots</div>
        <div class="game-card">WG Esportes</div>
    </div>

    <!-- O formulário fica aqui, mas não aparece na tela principal -->
    <div id="deposit-modal">
        <div class="modal-content">
            <h3>Depósito PIX</h3>
            <input type="number" placeholder="Valor" style="width: 100%; padding: 10px;">
            <button onclick="document.getElementById('deposit-modal').style.display='none'">Confirmar</button>
        </div>
    </div>
</body>
</html>
